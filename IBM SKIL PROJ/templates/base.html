<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Kisan Mitra{% endblock %} – Smart Farming Advisor</title>
  <!-- Google Font: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet"/>
  {% block extra_head %}{% endblock %}
</head>
<body>

<!-- ══ Floating background blobs ══ -->
<div class="km-bg-blobs" aria-hidden="true">
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
</div>

<!-- ══════════════════════════════ NAVBAR ══════════════════════════════ -->
<nav class="navbar navbar-expand-lg km-navbar sticky-top" id="mainNavbar">

  <div class="container-fluid px-3 px-md-4">

    <a class="navbar-brand d-flex align-items-center gap-2" href="/">
      <span class="tractor-icon">🚜</span>
      <span>Kisan Mitra</span>
      <span class="badge ms-1 fw-semibold d-none d-sm-inline"
            style="font-size:.6rem;background:rgba(62,207,130,.22);color:#3ecf82;border:1px solid rgba(62,207,130,.3);border-radius:20px;padding:.18rem .55rem;letter-spacing:.06em">
        AI ADVISOR
      </span>
    </a>

    <button class="navbar-toggler border-0" type="button"
            data-bs-toggle="collapse" data-bs-target="#mainNav"
            aria-label="Toggle navigation">
      <i class="bi bi-list" style="color:#fff;font-size:1.3rem"></i>
    </button>

    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav mx-auto gap-1 py-2 py-lg-0">
        <li class="nav-item">
          <a class="nav-link km-nav-link {% if request.path=='/' %}active{% endif %}" href="/">
            <i class="bi bi-house-fill me-1"></i>Home
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link km-nav-link {% if '/dashboard' in request.path %}active{% endif %}" href="/dashboard">
            <i class="bi bi-speedometer2 me-1"></i>Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link km-nav-link {% if '/chat' in request.path %}active{% endif %}" href="/chat">
            <i class="bi bi-chat-dots-fill me-1"></i>AI Chat
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link km-nav-link {% if '/diseases' in request.path %}active{% endif %}" href="/diseases">
            <i class="bi bi-bug-fill me-1"></i>Diseases
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link km-nav-link {% if '/rates' in request.path %}active{% endif %}" href="/rates">
            <i class="bi bi-currency-rupee me-1"></i>Mandi Rates
          </a>
        </li>
      </ul>

      <div class="d-flex align-items-center gap-2 mt-2 mt-lg-0">
        <select id="langSelect" class="km-lang-select">
          <option value="en">🌐 EN</option>
          <option value="hi">🇮🇳 हिंदी</option>
          <option value="mr">मराठी</option>
          <option value="ta">தமிழ்</option>
          <option value="te">తెలుగు</option>
          <option value="pa">ਪੰਜਾਬੀ</option>
          <option value="bn">বাংলা</option>
          <option value="gu">ગુજ</option>
        </select>
        <button id="darkToggle" class="km-toggle-btn" title="Toggle dark mode">
          <i class="bi bi-moon-stars-fill"></i>
        </button>
      </div>
    </div>

  </div><!-- /container-fluid -->
</nav>

{% block content %}{% endblock %}

<!-- ══════════════════════════════ FOOTER ══════════════════════════════ -->
<footer class="km-footer text-center py-3 mt-5">
  <div class="container">
    <small class="text-muted">
      🌾 Kisan Mitra &nbsp;·&nbsp; Powered by <strong>IBM Watsonx Granite</strong>
      &nbsp;·&nbsp; Data: ICAR &nbsp;·&nbsp; Open-Meteo &nbsp;·&nbsp; Agmarknet
    </small>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/common.js') }}"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
